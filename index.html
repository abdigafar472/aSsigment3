DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Internal CSS Registration</title>
    
    <!-- Internal CSS Section -->
    <style>
        /* Set background color and padding for the whole page */
        body {
            background-color: #e0f7fa; /* Light cyan background */
            padding: 50px;
            font-family: Helvetica, Arial, sans-serif;
        }

        /* Container for the form to make it look neat */
        .form-container {
            background-color: #ffffff;
            width: 400px;
            margin: 0 auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Change the font style of the labels */
        label {
            font-family: 'Courier New', Courier, monospace; /* Monospace font */
            font-weight: bold;
            font-style: italic;
            display: block;
            margin-top: 15px;
            color: #00695c;
        }

        /* Styling inputs for better appearance */
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        /* Submit button styling */
        button {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background-color: #004d40;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #00695c;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h1 style="text-align: center; color: #333;">Student Registration</h1>
        
        <form action="#" method="POST">
            <label for="fullname">Full Name:</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your name">

            <label for="studentNum">Student Number:</label>
            <input type="text" id="studentNum" name="studentNum" placeholder="e.g., 12345678">

            <label for="phone">Telephone Number:</label>
            <input type="tel" id="phone" name="phone" placeholder="Enter phone number">

            <label for="email">Email Address:</label>
            <input type="email" id="email" name="email" placeholder="student@example.com">

            <button type="submit">Submit Registration</button>
        </form>
    </div>

</body>
</html>
